name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example: v1.2.3)"
        required: true
        type: string
      target:
        description: "Branch or commit to release from"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = [string]"${{ github.event.inputs.tag }}"
          } else {
            $tag = [string]"${{ github.ref_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is required."
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+([\-+][0-9A-Za-z\.-]+)?$') {
            throw "Release tag must follow SemVer and start with 'v' (for example: v1.2.3)."
          }
          $version = (Get-Content -Path "VERSION" -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "VERSION file is empty."
          }
          if ($version -ne $tag.TrimStart("v")) {
            throw ("VERSION mismatch. VERSION='{0}', tag='{1}'." -f $version, $tag)
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "release_name=Teams Always Green $tag" >> $env:GITHUB_OUTPUT

      - name: Verify QuickSetup manifest signature
        shell: pwsh
        run: |
          ./Tools/release/Generate-QuickSetupManifest.ps1 -Check -RequireSignature -ManifestPublicKeyPath "security/quicksetup-manifest-public.xml"

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run quality checks
        shell: pwsh
        run: |
          ./Tools/ci/Invoke-QualityChecks.ps1 -Ci -WarningBudgetFile "Tools/config/PSScriptAnalyzer.warning-budget.json" -CoverageConfigFile "Tools/config/Pester.coverage.json"

      - name: Materialize update signing key
        id: keys
        shell: pwsh
        env:
          UPDATE_SIGNING_PRIVATE_KEY_XML: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_XML }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:UPDATE_SIGNING_PRIVATE_KEY_XML)) {
            throw "Missing GitHub secret: UPDATE_SIGNING_PRIVATE_KEY_XML"
          }
          $privatePath = Join-Path $env:RUNNER_TEMP "update-private.xml"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($privatePath, $env:UPDATE_SIGNING_PRIVATE_KEY_XML, $utf8NoBom)
          "update_private_key=$privatePath" >> $env:GITHUB_OUTPUT

      - name: Materialize Authenticode signing certificate
        id: codesign
        shell: pwsh
        env:
          AUTHENTICODE_CERT_PFX_BASE64: ${{ secrets.AUTHENTICODE_CERT_PFX_BASE64 }}
          AUTHENTICODE_CERT_PASSWORD: ${{ secrets.AUTHENTICODE_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:AUTHENTICODE_CERT_PFX_BASE64)) {
            throw "Missing GitHub secret: AUTHENTICODE_CERT_PFX_BASE64"
          }
          if ([string]::IsNullOrWhiteSpace($env:AUTHENTICODE_CERT_PASSWORD)) {
            throw "Missing GitHub secret: AUTHENTICODE_CERT_PASSWORD"
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "release-codesign.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:AUTHENTICODE_CERT_PFX_BASE64))
          $securePassword = ConvertTo-SecureString -String $env:AUTHENTICODE_CERT_PASSWORD -AsPlainText -Force
          $imported = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation "Cert:\CurrentUser\My" -Password $securePassword -Exportable
          if (-not $imported) {
            throw "Authenticode certificate import failed."
          }
          $thumbprint = [string]($imported | Select-Object -First 1 -ExpandProperty Thumbprint)
          if ([string]::IsNullOrWhiteSpace($thumbprint)) {
            throw "Imported certificate thumbprint could not be resolved."
          }
          "codesign_thumbprint=$thumbprint" >> $env:GITHUB_OUTPUT

      - name: Sign release script (Authenticode)
        id: sign_auth
        shell: pwsh
        run: |
          $source = "app/runtime/Teams Always Green.ps1"
          $signed = Join-Path $env:RUNNER_TEMP "Teams Always Green.ps1"
          Copy-Item -LiteralPath $source -Destination $signed -Force
          $cert = Get-Item -Path ("Cert:\CurrentUser\My\{0}" -f "${{ steps.codesign.outputs.codesign_thumbprint }}") -ErrorAction Stop
          $result = Set-AuthenticodeSignature -FilePath $signed -Certificate $cert -TimestampServer "http://timestamp.digicert.com"
          if ($result.Status -notin @("Valid", "NotTrusted")) {
            throw ("Authenticode signing failed with status: {0}" -f [string]$result.Status)
          }
          "signed_script=$signed" >> $env:GITHUB_OUTPUT

      - name: Verify Authenticode policy
        shell: pwsh
        run: |
          ./Tools/release/Verify-AuthenticodePolicy.ps1 `
            -InputFiles "${{ steps.sign_auth.outputs.signed_script }}" `
            -ExpectedThumbprint "${{ steps.codesign.outputs.codesign_thumbprint }}"

      - name: Generate update asset signature
        id: sign_update
        shell: pwsh
        run: |
          $sigPath = Join-Path $env:RUNNER_TEMP "Teams Always Green.ps1.sig"
          ./Tools/release/Generate-UpdateSignature.ps1 `
            -InputFile "${{ steps.sign_auth.outputs.signed_script }}" `
            -PrivateKeyPath "${{ steps.keys.outputs.update_private_key }}" `
            -SignaturePath $sigPath `
            -OutputEncoding Hex `
            -Verify `
            -PublicKeyPath "security/Teams-Always-Green.updatekey.xml"
          "update_sig=$sigPath" >> $env:GITHUB_OUTPUT

      - name: Generate SBOM
        id: sbom
        shell: pwsh
        run: |
          $sbomPath = Join-Path $env:RUNNER_TEMP "Teams-Always-Green.sbom.cdx.json"
          ./Tools/release/Generate-Sbom.ps1 -OutputPath $sbomPath
          "sbom_path=$sbomPath" >> $env:GITHUB_OUTPUT

      - name: Generate provenance
        id: provenance
        shell: pwsh
        run: |
          $provenancePath = Join-Path $env:RUNNER_TEMP "Teams-Always-Green.provenance.json"
          ./Tools/release/Generate-Provenance.ps1 `
            -Tag "${{ steps.meta.outputs.tag }}" `
            -Version "${{ steps.meta.outputs.version }}" `
            -SubjectFiles @(
              "${{ steps.sign_auth.outputs.signed_script }}",
              "${{ steps.sign_update.outputs.update_sig }}",
              "app/setup/QuickSetup.manifest.json",
              "app/setup/QuickSetup.manifest.sig",
              "${{ steps.sbom.outputs.sbom_path }}"
            ) `
            -OutputPath $provenancePath
          "provenance_path=$provenancePath" >> $env:GITHUB_OUTPUT

      - name: Generate release checksums
        id: checksums
        shell: pwsh
        run: |
          $checksumsPath = Join-Path $env:RUNNER_TEMP "Teams-Always-Green.release.sha256"
          ./Tools/release/Generate-ReleaseChecksums.ps1 `
            -InputFiles @(
              "${{ steps.sign_auth.outputs.signed_script }}",
              "${{ steps.sign_update.outputs.update_sig }}",
              "app/setup/QuickSetup.manifest.json",
              "app/setup/QuickSetup.manifest.sig",
              "${{ steps.sbom.outputs.sbom_path }}",
              "${{ steps.provenance.outputs.provenance_path }}"
            ) `
            -OutputPath $checksumsPath
          "checksums_path=$checksumsPath" >> $env:GITHUB_OUTPUT

      - name: Build release notes
        id: notes
        shell: pwsh
        run: |
          $version = [string]"${{ steps.meta.outputs.version }}"
          $tag = [string]"${{ steps.meta.outputs.tag }}"
          $changelogPath = "CHANGELOG.md"
          if (-not (Test-Path -LiteralPath $changelogPath -PathType Leaf)) {
            throw "Missing CHANGELOG.md."
          }
          $lines = Get-Content -Path $changelogPath
          $startPattern = "^## \[$([Regex]::Escape($version))\](?:\s*-\s*.+)?$"
          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match $startPattern) {
              $start = $i
              break
            }
          }
          if ($start -lt 0) {
            throw ("Could not find changelog entry for version '{0}'." -f $version)
          }
          $end = $lines.Count
          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^## \[') {
              $end = $i
              break
            }
          }
          $section = @()
          if ($end -gt ($start + 1)) {
            $section = $lines[($start + 1)..($end - 1)]
          }
          while ($section.Count -gt 0 -and [string]::IsNullOrWhiteSpace($section[0])) {
            if ($section.Count -eq 1) {
              $section = @()
              break
            }
            $section = @($section | Select-Object -Skip 1)
          }
          while ($section.Count -gt 0 -and [string]::IsNullOrWhiteSpace($section[$section.Count - 1])) {
            if ($section.Count -eq 1) {
              $section = @()
              break
            }
            $section = @($section | Select-Object -First ($section.Count - 1))
          }
          if ($section.Count -eq 0) {
            $section = @("### Changed", "- See CHANGELOG.md for release details.")
          }
          $notes = @(
            "### Teams Always Green $tag",
            "",
            "Release summary from \`CHANGELOG.md\`:",
            ""
          ) + $section
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllLines($notesPath, $notes, $utf8NoBom)
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          generate_release_notes: false
          make_latest: true
          files: |
            ${{ steps.sign_auth.outputs.signed_script }}
            ${{ steps.sign_update.outputs.update_sig }}
            app/setup/QuickSetup.manifest.json
            app/setup/QuickSetup.manifest.sig
            ${{ steps.sbom.outputs.sbom_path }}
            ${{ steps.provenance.outputs.provenance_path }}
            ${{ steps.checksums.outputs.checksums_path }}
