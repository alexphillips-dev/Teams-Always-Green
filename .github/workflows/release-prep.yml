name: Release Prep

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify QuickSetup manifest freshness
        shell: pwsh
        run: |
          ./Tools/Generate-QuickSetupManifest.ps1 -Check -RequireSignature -ManifestPublicKeyPath "Meta/Keys/quicksetup-manifest-public.xml"
