[extend]
useDefault = true

[allowlist]
description = "Allow QuickSetup manifest SHA256 entries for public update key files"
paths = [
  '''Script/QuickSetup/QuickSetup\.manifest\.json'''
]
regexes = [
  '''"Meta/Teams-Always-Green\.updatekey\.xml"\s*:\s*"[A-Fa-f0-9]{64}"''',
  '''"security/Teams-Always-Green\.updatekey\.xml"\s*:\s*"[A-Fa-f0-9]{64}"'''
]
